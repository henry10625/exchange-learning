<!DOCTYPE html>
<html>
<head>
  <title>The Exchange - Needs</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .need-card {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .urgent {
      border: 2px solid red;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>The Exchange</h1>

<div class="need-card">
  <p><strong>Need:</strong> Help moving this weekend</p>
  <p class="status">Open</p>
</div>

<div class="need-card">
  <p><strong>Need:</strong> Ride to church on Sunday</p>
  <p class="status">In Progress</p>
</div>

<div class="need-card">
  <p><strong>Need:</strong> Help with groceries</p>
  <p class="status">Fulfilled</p>
</div>

<button onclick="setActive(this); filterNeeds('Open')">Open</button>
<button onclick="setActive(this); filterNeeds('In Progress')">In Progress</button>
<button onclick="setActive(this); filterNeeds('Fulfilled')">Fulfilled</button>
<button onclick="setActive(this); showAll()">Show All</button>

<script>
const cards = document.querySelectorAll(".need-card");

function filterNeeds(status) {
  cards.forEach(card => {
    if (card.innerText.includes(status)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

function showAll() {
  cards.forEach(card => {
    card.style.display = "block";
  });
}

// Color-code statuses
document.querySelectorAll(".status").forEach(el => {
  const status = el.innerText;

  if (status === "Open") el.style.color = "orange";
  if (status === "In Progress") el.style.color = "blue";
  if (status === "Fulfilled") el.style.color = "green";
});
function setActive(button) {
  document.querySelectorAll("button").forEach(btn => {
    btn.style.background = "black";
  });

  button.style.background = "gray";
}
``
</script>

</body>
</html>
